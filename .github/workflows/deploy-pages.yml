name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Build and Publish gh-pages Branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run full verify
        run: npm run verify

      - name: Build GitHub Pages export
        env:
          DEPLOY_TARGET: github-pages
        run: npm run build

      - name: Publish static site to gh-pages
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          DEPLOY_DIR="${RUNNER_TEMP}/gh-pages"
          rm -rf "${DEPLOY_DIR}"

          git fetch origin gh-pages --depth=1 || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add --detach "${DEPLOY_DIR}" origin/gh-pages
          else
            git worktree add -b gh-pages "${DEPLOY_DIR}"
          fi

          find "${DEPLOY_DIR}" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -a out/. "${DEPLOY_DIR}/"
          touch "${DEPLOY_DIR}/.nojekyll"

          cd "${DEPLOY_DIR}"
          git add --all
          if git diff --cached --quiet; then
            echo "No Pages changes to publish."
            exit 0
          fi

          git commit -m "Deploy GitHub Pages for ${GITHUB_SHA}"
          git push origin HEAD:gh-pages --force
